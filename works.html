<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hope4Hope – Works</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23ffed00'/></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @font-face {
            font-family: 'aeonikmono-regular';
            src: url('fonts/AeonikMono-Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: 'aeonikmono-regular', monospace;
            background-color: #ffed00;
            color: #1a1a1a;
        }

        .nav-links {
            position: fixed;
            top: 2rem;
            right: 2rem;
            z-index: 101;
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            font-size: 0.95rem;
            color: #1a1a1a;
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s ease;
            border-bottom: 2px solid transparent;
            padding-bottom: 2px;
        }

        .nav-links a:hover {
            opacity: 0.5;
            border-bottom-color: #1a1a1a;
        }

        .nav-links a.active {
            border-bottom-color: #1a1a1a;
        }

        .nav-links {
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .nav-links.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .header {
            padding: 3rem 2rem 2rem;
            text-align: center;
            border-bottom: 1px solid #1a1a1a;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
        }

        .header p {
            font-size: 0.95rem;
            color: #1a1a1a;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem 3rem 2rem;
        }

        .works-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .work-card {
            background: transparent;
            border: none;
            border-top: 1px solid #1a1a1a;
            border-radius: 0;
            padding: 1.5rem 0;
            cursor: pointer;
            transition: opacity 0.2s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
        }

        .work-card:hover {
            opacity: 0.5;
        }

        .work-card h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .work-card p {
            font-size: 0.9rem;
            color: #1a1a1a;
            line-height: 1.6;
            flex-grow: 1;
            margin-bottom: 1rem;
        }

        .work-card .artist {
            font-size: 0.85rem;
            color: #1a1a1a;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .nav-links {
                top: 1.5rem;
                right: 1.5rem;
                gap: 1rem;
            }

            .nav-links a {
                font-size: 0.85rem;
            }

            .header {
                padding: 2rem 1.5rem 1.5rem;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .container {
                padding: 0 1.5rem 2rem 1.5rem;
            }

            .works-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 1.5rem;
                margin-bottom: 1.5rem;
            }

            .work-card {
                padding: 1.2rem;
            }
        }

        @media (max-width: 480px) {
            .nav-links {
                top: 1rem;
                right: 1rem;
                gap: 0.5rem;
            }

            .nav-links a {
                font-size: 0.75rem;
            }

            .header {
                padding: 3rem 1rem 1rem;
            }

            .header h1 {
                font-size: 1.25rem;
            }

            .header p {
                font-size: 0.9rem;
            }

            .container {
                padding: 0 1rem 2rem 1rem;
            }

            .works-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .work-card {
                padding: 1rem;
            }

            .work-card h3 {
                font-size: 1rem;
            }

            .work-card p {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="nav-links">
        <a href="index.html">Network Graph</a>
        <a href="about.html">About</a>
        <a href="works.html" class="active">Work Descriptions</a>
    </div>

    <div class="header">
        <h1>Works</h1>
    </div>

    <div class="container">
        <div class="works-grid" id="works-grid"></div>
    </div>

    <script>
        const works = [
            {
                id: "work-1",
                title: "L  E   F  T<br>F  E  L   T",
                artist: "Khadisha Dabayeva",
                description: "Mixed Media Installation"
            },
            {
                id: "work-2",
                title: "Staying in Touch 2.0",
                artist: "Lili Kátai and Elias Schulz",
                description: "Performance"
            },
            {
                id: "work-3",
                title: "The Grammar of Agency",
                artist: "Yiwen Che",
                description: "A Series of Interactive Installations"
            },
            {
                id: "work-4",
                title: "hopestars: werden",
                artist: "the funky siblings | Aimée Kohn and Charlotte Kuoi",
                description: "Quest Game | Mixed Media | Ceramics | Mosaik"
            },
            {
                id: "work-5",
                title: "Facing It",
                artist: "Marshall Paul",
                description: "Stop Motion Video<br>(6 Minutes 44 Seconds)"
            },
            {
                id: "work-6",
                title: "How to resist tech-bros",

            },
            {
                id: "work-7",

            },
            {
                id: "work-8",
                title: "Resignation and the Refusal to Resign",
                artist: "Sophie Hamann",
                description: "Robotic Textile and Wood Installation"
            },
            {
                id: "work-9",
                title: "exhausting a place",

            },
            {
                id: "work-10",

            },
            {
                id: "work-11",

            },

            {

            {

            },
        ];

        const grid = document.getElementById("works-grid");
        works.forEach(work => {
            const card = document.createElement("a");
            card.href = `work_descriptions/${work.id}.html`;
            card.className = "work-card";
            card.innerHTML = `
                <h3>${work.title}</h3>
                <p>${work.description}</p>
                <span class="artist">by ${work.artist}</span>
            `;
            grid.appendChild(card);
        });
    </script>
    <script src="hide-on-scroll.js"></script>
</body>
</html>
