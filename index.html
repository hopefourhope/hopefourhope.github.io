<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hope4Hope – Network</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'aeonikmono-regular', monospace;
            background-color: #ffed00;
            color: #1a1a1a;
            overflow: hidden;
        }

        @font-face {
            font-family: 'aeonikmono-regular';
            src: url('fonts/AeonikMono-Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 2rem;
            background: linear-gradient(to bottom, rgba(255, 237, 0, 1), rgba(255, 237, 0, 0.9));
            z-index: 100;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
        }

        .header p {
            font-size: 0.95rem;
            color: #1a1a1a;
            opacity: 0.6;
        }

        .nav-links {
            position: fixed;
            top: 2rem;
            right: 2rem;
            z-index: 101;
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            font-size: 0.95rem;
            color: #1a1a1a;
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s ease;
            border-bottom: 2px solid transparent;
            padding-bottom: 2px;
        }

        .nav-links a:hover {
            opacity: 0.5;
            border-bottom-color: #1a1a1a;
        }

        .nav-links a.active {
            border-bottom-color: #1a1a1a;
        }

        #graph-container {
            width: 100%;
            height: 100vh;
            position: relative;
            background-color: #ffed00;
        }

        svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .node-group {
            cursor: pointer;
        }

        .node-circle {
            stroke-width: 2px;
        }

        .node-group:hover .node-circle {
            stroke-width: 3px;
            opacity: 0.85;
        }

        .node-label {
            pointer-events: none;
            font-family: 'aeonikmono-regular', monospace;
        }

        .link {
            stroke: #1a1a1a;
            stroke-width: 1px;
            opacity: 0.2;
        }

        .tooltip {
            position: absolute;
            background: #1a1a1a;
            color: #ffed00;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            z-index: 200;
            max-width: 200px;
            word-wrap: break-word;
            display: none;
            font-family: 'aeonikmono-regular', monospace;
        }

        .info-panel {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            background: rgba(255, 237, 0, 0.9);
            backdrop-filter: blur(10px);
            padding: 1.5rem;
            border-radius: 4px;
            border: 1.5px solid #1a1a1a;
            max-width: 300px;
            font-size: 0.9rem;
            line-height: 1.6;
            color: #1a1a1a;
            z-index: 100;
        }

        .info-panel h3 {
            font-size: 1.1rem;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .info-panel p {
            margin: 0;
            opacity: 0.7;
        }

        .legend {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            font-family: 'aeonikmono-regular', monospace;
            color: #1a1a1a;
        }

        .legend-dot-work {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #1a1a1a;
            flex-shrink: 0;
        }

        .legend-dot-mode {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ffed00;
            border: 2px solid #1a1a1a;
            flex-shrink: 0;
        }

        @media (max-width: 768px) {
            .header {
                padding: 1.5rem;
            }
            .header h1 {
                font-size: 1.5rem;
            }
            .nav-links {
                top: 1.5rem;
                right: 1.5rem;
                gap: 1rem;
            }
            .nav-links a {
                font-size: 0.85rem;
            }
            .info-panel {
                bottom: 1.5rem;
                left: 1.5rem;
                max-width: calc(100vw - 3rem);
            }
            .legend {
                bottom: 1.5rem;
                right: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 1rem;
            }
            .header h1 {
                font-size: 1.25rem;
            }
            .header p {
                font-size: 0.85rem;
            }
            .nav-links {
                top: 1rem;
                right: 1rem;
                gap: 0.5rem;
            }
            .nav-links a {
                font-size: 0.75rem;
            }
            .info-panel {
                bottom: 1rem;
                left: 1rem;
                padding: 1rem;
                max-width: calc(100vw - 2rem);
                font-size: 0.85rem;
            }
            .legend {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Hope4Hope</h1>
        <p>Explore the network</p>
    </div>

    <div class="nav-links">
        <a href="index.html" class="active">Network Graph</a>
        <a href="about.html">About</a>
        <a href="works.html">Work Descriptions</a>
    </div>

    <div id="graph-container">
        <svg id="graph"></svg>
    </div>

    <div class="info-panel">
        <h3 id="info-title">Hope4Hope Network</h3>
        <p id="info-text">Click on any node to explore. Drag to move around the network.</p>
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-dot-work"></div>
            <span>Works</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot-mode"></div>
            <span>Modes of Hope</span>
        </div>
    </div>

    <div class="tooltip" id="tooltip"></div>

    <script src="data.js"></script>
    <script>
        // Generate nodes from works and modes
        let nodes = [];

        // Add work nodes
        Object.entries(workMeta).forEach(([workId, meta]) => {
            if (meta.title !== "Work Title 16") {  // Skip placeholder
                const title = meta.title.length > 20 ? meta.title.substring(0, 17) + "..." : meta.title;
                nodes.push({
                    id: workId,
                    label: meta.title,
                    artist: meta.artist,
                    type: "work",
                    // filled black
                    fillColor: "#1a1a1a",
                    strokeColor: "none",
                    textColor: "#ffed00"
                });
            }
        });

        // Calculate degree (connection count) for each mode
        const modeDegree = {};
        Object.values(artistModes).forEach(modes => {
            modes.forEach(mode => {
                modeDegree[mode] = (modeDegree[mode] || 0) + 1;
            });
        });

        // Add mode nodes — hollow (outline only)
        Object.entries(modeDegree).forEach(([modeId, degree]) => {
            nodes.push({
                id: modeId,
                label: modeId.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' '),
                type: "mode",
                degree: degree,
                // hollow
                fillColor: "#ffed00",
                strokeColor: "#1a1a1a",
                textColor: "#1a1a1a"
            });
        });

        // Generate links from artistModes mapping
        const links = [];
        Object.entries(artistModes).forEach(([workId, modes]) => {
            modes.forEach(mode => {
                links.push({ source: workId, target: mode });
            });
        });

        const svg = d3.select("#graph");
        let width = window.innerWidth;
        let height = window.innerHeight;

        svg.attr("width", width).attr("height", height);

        const link = svg.append("g")
            .attr("class", "links")
            .selectAll("line")
            .data(links)
            .join("line")
            .attr("class", "link");

        const nodeGroup = svg.append("g")
            .attr("class", "nodes")
            .selectAll("g")
            .data(nodes)
            .join("g")
            .attr("class", d => `node-group node-${d.type}`)
            .call(drag());

        nodeGroup.append("circle")
            .attr("class", "node-circle")
            .attr("r", 30)
            .attr("fill", d => d.fillColor)
            .attr("stroke", d => d.strokeColor)
            .attr("stroke-width", d => d.type === "mode" ? 2 : 0);

        nodeGroup.append("text")
            .attr("class", "node-label")
            .attr("text-anchor", "middle")
            .attr("pointer-events", "none")
            .style("font-size", "9px")
            .style("font-weight", "500")
            .style("fill", d => d.textColor)
            .each(function(d) {
                const words = d.label.split(" ");
                const lineHeight = 11;
                const lines = [];
                let current = "";
                words.forEach(word => {
                    const test = current ? current + " " + word : word;
                    if (test.length > 10 && current) {
                        lines.push(current);
                        current = word;
                    } else {
                        current = test;
                    }
                });
                if (current) lines.push(current);
                const startY = -((lines.length - 1) * lineHeight) / 2;
                lines.forEach((line, i) => {
                    d3.select(this).append("tspan")
                        .attr("x", 0)
                        .attr("dy", i === 0 ? startY + "px" : lineHeight + "px")
                        .text(line);
                });
            });

        const simulation = d3.forceSimulation(nodes)
            .force("link", d3.forceLink(links).id(d => d.id).distance(100).strength(0.6))
            .force("charge", d3.forceManyBody().strength(-800))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collide", d3.forceCollide().radius(48).iterations(3))
            .force("x", d3.forceX(width / 2).strength(0.01))
            .force("y", d3.forceY(height / 2).strength(0.01));

        // Adjacency map for neighbor highlighting
        const neighbors = {};
        nodes.forEach(n => neighbors[n.id] = new Set());
        links.forEach(l => {
            const sourceId = typeof l.source === "string" ? l.source : l.source.id;
            const targetId = typeof l.target === "string" ? l.target : l.target.id;
            neighbors[sourceId].add(targetId);
            neighbors[targetId].add(sourceId);
        });

        nodeGroup.on("mouseenter", function(event, d) {
            const tooltip = document.getElementById("tooltip");
            tooltip.textContent = d.label + (d.artist ? ` by ${d.artist}` : "");
            tooltip.style.display = "block";
            tooltip.style.left = event.pageX + 10 + "px";
            tooltip.style.top = event.pageY + 10 + "px";

            document.getElementById("info-title").textContent = d.label;
            document.getElementById("info-text").textContent =
                d.type === "work"
                    ? `${d.artist} — ${neighbors[d.id].size} connected modes`
                    : `${d.degree} works engage with this mode`;

            const neighborSet = neighbors[d.id];
            nodeGroup.style("opacity", n => (n.id === d.id || neighborSet.has(n.id)) ? 1 : 0.15);
            link.style("opacity", l => {
                const sourceId = typeof l.source === "string" ? l.source : l.source.id;
                const targetId = typeof l.target === "string" ? l.target : l.target.id;
                return (sourceId === d.id || targetId === d.id) ? 0.5 : 0.05;
            });

            d3.select(this).select("circle")
                .transition().duration(200)
                .attr("r", 36);
        })
        .on("mouseleave", function() {
            document.getElementById("tooltip").style.display = "none";
            nodeGroup.style("opacity", 1);
            link.style("opacity", 0.2);
            d3.select(this).select("circle")
                .transition().duration(200)
                .attr("r", 30);
        })
        .on("mousemove", function(event) {
            const tooltip = document.getElementById("tooltip");
            tooltip.style.left = event.pageX + 10 + "px";
            tooltip.style.top = event.pageY + 10 + "px";
        })
        .on("click", function(event, d) {
            event.stopPropagation();
            if (d.type === "work") {
                window.location.href = `work_descriptions/${d.id}.html`;
            } else {
                window.location.href = `content/${d.id}.html`;
            }
        });

        simulation.on("tick", () => {
            const padding = 50;
            const nodeRadius = 30;
            const headerHeight = document.querySelector('.header').offsetHeight;

            nodes.forEach(d => {
                d.x = Math.max(padding + nodeRadius, Math.min(width - padding - nodeRadius, d.x));
                d.y = Math.max(headerHeight + nodeRadius + 10, Math.min(height - padding - nodeRadius, d.y));            });

            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);

            nodeGroup
                .attr("transform", d => `translate(${d.x},${d.y})`);
        });

        function drag() {
            function dragstarted(event, d) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                d.fx = d.x;
                d.fy = d.y;
            }

            function dragged(event, d) {
                const padding = 50;
                const nodeRadius = 30;
                const headerHeight = document.querySelector('.header').offsetHeight;
                d.fx = Math.max(padding + nodeRadius, Math.min(width - padding - nodeRadius, event.x));
                d.fy = Math.max(headerHeight + nodeRadius + 10, Math.min(height - padding - nodeRadius, event.y));
            }

            function dragended(event, d) {
                if (!event.active) simulation.alphaTarget(0);
                d.fx = null;
                d.fy = null;
            }

            return d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended);
        }

        function updateDimensions() {
            width = window.innerWidth;
            height = window.innerHeight;

            svg.attr("width", width).attr("height", height);

            simulation
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("x", d3.forceX(width / 2).strength(0.01))
                .force("y", d3.forceY(height / 2).strength(0.01))
                .alpha(0.3)
                .restart();
        }

        window.addEventListener("resize", updateDimensions);
        updateDimensions();
    </script>
</body>
</html>
